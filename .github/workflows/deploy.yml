name: Deploy

on:
  push:
    branches: [main]

env:
  PROJECT_ID: cvtechtailor
  REGION: us-central1
  SERVICE: resume-tailor-api
  GAR_REPO: CVTechTailor

jobs:
  # ---------------------------------------------------------------------------
  # Backend → Cloud Run
  # ---------------------------------------------------------------------------
  deploy-backend:
    name: Build & deploy backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.SERVICE }}:${{ github.sha }}"
          docker build -t "$IMAGE" ./backend
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.SERVICE }}:${{ github.sha }}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "\
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }},\
          MONGODB_URI=${{ secrets.MONGODB_URI }},\
          GITHUB_CLIENT_ID=${{ secrets.GITHUB_CLIENT_ID }},\
          GITHUB_CLIENT_SECRET=${{ secrets.GITHUB_CLIENT_SECRET }},\
          ENVIRONMENT=production,\
          FRONTEND_URL=https://cvtechtailor.web.app"

  # ---------------------------------------------------------------------------
  # Frontend → Firebase Hosting
  # ---------------------------------------------------------------------------
  deploy-frontend:
    name: Build & deploy frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: cvtechtailor.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: cvtechtailor
          VITE_FIREBASE_STORAGE_BUCKET: cvtechtailor.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: 289709961826
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: cvtechtailor
          channelId: live
